<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chugur | Найди игрока</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
        }

        .app {
            max-width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            padding-bottom: 70px;
        }

        .header {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            color: #fff;
        }

        .content {
            padding: 20px;
        }

        .search-block {
            background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(78,205,196,0.15));
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .search-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .search-desc {
            text-align: center;
            opacity: 0.7;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .search-input-group {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .search-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            color: white;
            outline: none;
            font-family: monospace;
        }

        .search-input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .result-card {
            background: rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            animation: slideIn 0.25s ease;
            border: 1px solid #ff6b6b;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .result-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background: #2a2a3a;
            border: 2px solid #ff6b6b;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-size: 20px;
            font-weight: 700;
        }

        .result-username {
            font-size: 14px;
            opacity: 0.7;
            font-family: monospace;
            margin-top: 4px;
        }

        .result-bio {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.8;
        }

        .message-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 15px;
            width: 100%;
            margin-top: 12px;
        }

        .not-found {
            background: rgba(255,80,80,0.2);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            color: #ff9e9e;
            border: 1px solid rgba(255,80,80,0.4);
        }

        .players-list {
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-item {
            background: rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .player-item:active {
            background: rgba(255,255,255,0.15);
        }

        .player-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            font-size: 16px;
        }

        .player-username {
            font-size: 12px;
            opacity: 0.6;
            font-family: monospace;
        }

        .player-write {
            background: rgba(255,107,107,0.3);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(10,10,15,0.9);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: rgba(255,255,255,0.12);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-area {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-send {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 32px;
            border-radius: 32px;
            width: 100%;
            max-width: 380px;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 16px;
            color: #fff;
        }

        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            margin-top: 15px;
            text-align: center;
            color: #ff6b6b;
            cursor: pointer;
        }

        .avatar-preview {
            text-align: center;
            margin: 15px 0;
        }

        .avatar-preview img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff6b6b;
        }

        .file-label {
            background: rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
            margin-top: 10px;
        }

        .skip-label {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            margin-left: 10px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: rgba(255,255,255,0.6);
            position: relative;
        }

        .nav-item.active {
            color: #ff6b6b;
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(78,205,196,0.2));
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #ff6b6b;
            object-fit: cover;
        }

        input[type="file"] {
            display: none;
        }

        button {
            cursor: pointer;
        }
        
        .no-refresh {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header" id="header">
            <div class="logo" onclick="goHome()">Chugur</div>
            <div id="headerRight"></div>
        </div>

        <div id="authContainer"></div>
        <div id="mainContent"></div>

        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button type="button" class="nav-item" onclick="showSearch()">🔍</button>
            <button type="button" class="nav-item" onclick="showMessages()">💬</button>
            <button type="button" class="nav-item" onclick="showProfile()">👤</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let users = [];
        let messages = [];
        let currentChatUser = null;
        let updateInterval = null;

        // ========== СОХРАНЕНИЕ ==========
        function loadData() {
            const savedUsers = localStorage.getItem('chugur_users_final');
            const savedMessages = localStorage.getItem('chugur_msgs_final');
            
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [
                    { id: '1', username: 'admin', password: '123', name: 'Admin', bio: 'Главный игрок', avatar: '' },
                    { id: '2', username: 'player777', password: '777', name: 'Алекс', bio: 'Ищу соперников', avatar: '' }
                ];
                saveUsers();
            }
            
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
        }

        function saveUsers() {
            localStorage.setItem('chugur_users_final', JSON.stringify(users));
        }

        function saveMessages() {
            localStorage.setItem('chugur_msgs_final', JSON.stringify(messages));
        }

        function saveAll() {
            saveUsers();
            saveMessages();
            localStorage.setItem('chugur_update_final', Date.now().toString());
        }

        // Слушаем обновления в реальном времени
        window.addEventListener('storage', function(e) {
            if (e.key === 'chugur_update_final' || e.key === 'chugur_msgs_final') {
                loadData();
                if (currentChatUser) {
                    renderChat();
                }
                if (document.getElementById('dialogsList') && !currentChatUser) {
                    showMessages();
                }
                if (document.getElementById('allPlayers')) {
                    renderAllPlayers();
                }
                updateBadge();
            }
        });

        // ========== ГЕНЕРАЦИЯ USERNAME ==========
        function generateUsername() {
            let num = Math.floor(Math.random() * 900) + 100;
            let username = `player${num}`;
            while (users.some(u => u.username === username)) {
                num = Math.floor(Math.random() * 900) + 100;
                username = `player${num}`;
            }
            return username;
        }

        // ========== АУТЕНТИФИКАЦИЯ ==========
        let tempAvatar = null;

        function renderAuth() {
            document.getElementById('bottomNav').style.display = 'none';
            const container = document.getElementById('authContainer');
            container.style.display = 'block';
            document.getElementById('mainContent').innerHTML = '';
            
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="text-align:center; margin-bottom:20px;">🎮 Chugur</h2>
                        <input type="text" id="loginUsername" class="auth-input" placeholder="Username (player123)">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                        <button type="button" class="auth-btn" onclick="login()">Войти</button>
                        <div class="switch-auth" onclick="showRegister()">✨ Создать аккаунт</div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            tempAvatar = null;
            const container = document.getElementById('authContainer');
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="text-align:center; margin-bottom:20px;">📝 Новый аккаунт</h2>
                        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин 3)">
                        <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                        
                        <div class="avatar-preview" id="avatarPreview" style="display:none;">
                            <img id="previewImg" src="">
                        </div>
                        
                        <label class="file-label" for="avatarInput">📷 Выбрать фото профиля</label>
                        <label class="file-label skip-label" onclick="skipAvatar()">⏭ Пропустить</label>
                        <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarSelect(event)">
                        
                        <button type="button" class="auth-btn" onclick="register()">Зарегистрироваться</button>
                        <div class="switch-auth" onclick="renderAuth()">← Назад</div>
                    </div>
                </div>
            `;
        }

        function handleAvatarSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    tempAvatar = event.target.result;
                    const preview = document.getElementById('avatarPreview');
                    const img = document.getElementById('previewImg');
                    img.src = tempAvatar;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function skipAvatar() {
            tempAvatar = null;
            const preview = document.getElementById('avatarPreview');
            if (preview) preview.style.display = 'none';
        }

        function register() {
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value.trim();
            
            if (!password || password.length < 3) {
                alert('❌ Пароль минимум 3 символа');
                return;
            }
            
            const username = generateUsername();
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                name: name || username,
                bio: 'Новый игрок',
                avatar: tempAvatar || ''
            };
            
            users.push(newUser);
            saveUsers();
            currentUser = newUser;
            localStorage.setItem('chugur_current_final', JSON.stringify(currentUser));
            startApp();
            alert(`✅ Аккаунт создан!\n\n🎮 Твой username: ${username}\n🔐 Пароль: ${password}\n\nЗапомни! Тебя могут найти по этому username.`);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = JSON.parse(JSON.stringify(user));
                localStorage.setItem('chugur_current_final', JSON.stringify(currentUser));
                startApp();
            } else {
                alert('❌ Неверный username или пароль');
            }
        }

        function logout() {
            if (updateInterval) clearInterval(updateInterval);
            currentUser = null;
            localStorage.removeItem('chugur_current_final');
            renderAuth();
        }

        // ========== ПОИСК ИГРОКА ==========
        function showSearch() {
            if (!currentUser) return;
            
            document.getElementById('headerRight').innerHTML = '';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div class="search-block">
                        <div class="search-title">🔎 Найти игрока</div>
                        <div class="search-desc">Введи имя или username игрока</div>
                        <div class="search-input-group">
                            <input type="text" id="searchUsername" placeholder="Имя или username (например: Алекс или player777)" autocomplete="off">
                            <button type="button" class="search-btn" onclick="findPlayer()">Найти →</button>
                        </div>
                        <div id="searchResult"></div>
                    </div>
                    
                    <div class="players-list">
                        <div class="section-title">👥 Все игроки (кроме тебя)</div>
                        <div id="allPlayers"></div>
                    </div>
                </div>
            `;
            
            const input = document.getElementById('searchUsername');
            if (input) {
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') findPlayer(); });
            }
            
            renderAllPlayers();
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0]?.classList.add('active');
        }
        
        function findPlayer() {
            const query = document.getElementById('searchUsername').value.trim().toLowerCase();
            const resultDiv = document.getElementById('searchResult');
            
            if (!query) {
                resultDiv.innerHTML = '<div class="not-found">❌ Введи имя или username</div>';
                return;
            }
            
            const found = users.find(u => 
                (u.id !== currentUser.id) && 
                (u.username.toLowerCase() === query || u.name.toLowerCase() === query || u.name.toLowerCase().includes(query))
            );
            
            if (found) {
                const avatarUrl = found.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=70&name=${encodeURIComponent(found.name)}`;
                resultDiv.innerHTML = `
                    <div class="result-card">
                        <div class="result-header">
                            <img class="result-avatar" src="${avatarUrl}">
                            <div class="result-info">
                                <div class="result-name">${escapeHtml(found.name)}</div>
                                <div class="result-username">@${escapeHtml(found.username)}</div>
                                <div class="result-bio">${escapeHtml(found.bio || '')}</div>
                            </div>
                        </div>
                        <button type="button" class="message-btn" onclick="openChat('${found.id}')">💬 Написать сообщение</button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<div class="not-found">❌ Игрок с именем или username "${escapeHtml(query)}" не найден</div>`;
            }
        }
        
        function renderAllPlayers() {
            const container = document.getElementById('allPlayers');
            if (!container) return;
            
            const otherUsers = users.filter(u => u.id !== currentUser?.id);
            
            if (otherUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">😢 Пока нет других игроков</div>';
                return;
            }
            
            container.innerHTML = otherUsers.map(u => {
                const avatarUrl = u.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=52&name=${encodeURIComponent(u.name)}`;
                return `
                    <div class="player-item" onclick="openChat('${u.id}')">
                        <img class="player-avatar" src="${avatarUrl}">
                        <div class="player-info">
                            <div class="player-name">${escapeHtml(u.name)}</div>
                            <div class="player-username">@${escapeHtml(u.username)}</div>
                        </div>
                        <button type="button" class="player-write" onclick="event.stopPropagation(); openChat('${u.id}')">💬</button>
                    </div>
                `;
            }).join('');
        }
        
        // ========== ЧАТ ==========
        function openChat(userId) {
            const user = users.find(u => u.id === userId);
            if (!user) return;
            currentChatUser = user;
            renderChat();
        }
        
        function getChatMessages() {
            return messages.filter(m => 
                (m.fromId === currentUser.id && m.toId === currentChatUser.id) ||
                (m.fromId === currentChatUser.id && m.toId === currentUser.id)
            ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }
        
        function markAsRead() {
            let updated = false;
            messages.forEach(m => {
                if (m.toId === currentUser.id && m.fromId === currentChatUser.id && !m.read) {
                    m.read = true;
                    updated = true;
                }
            });
            if (updated) {
                saveMessages();
                updateBadge();
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            
            const newMessage = {
                id: Date.now().toString(),
                fromId: currentUser.id,
                toId: currentChatUser.id,
                fromName: currentUser.name,
                toName: currentChatUser.name,
                text: text,
                timestamp: new Date().toISOString(),
                read: false
            };
            
            messages.push(newMessage);
            saveAll();
            
            input.value = '';
            renderChat();
            updateBadge();
        }
        
        function renderChat() {
            const headerRight = document.getElementById('headerRight');
            headerRight.innerHTML = '';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const header = document.getElementById('header');
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.innerHTML = '←';
            backBtn.onclick = () => {
                currentChatUser = null;
                showMessages();
            };
            header.insertBefore(backBtn, header.firstChild);
            
            const chatMsgs = getChatMessages();
            markAsRead();
            
            const avatarUrl = currentChatUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=50&name=${encodeURIComponent(currentChatUser.name)}`;
            
            document.getElementById('mainContent').innerHTML = `
                <div class="chat-container">
                    <div class="chat-header">
                        <img src="${avatarUrl}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-bottom: 5px;">
                        <div><strong>${escapeHtml(currentChatUser.name)}</strong></div>
                        <div style="font-size:12px; opacity:0.6;">@${escapeHtml(currentChatUser.username)}</div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение..." autocomplete="off">
                        <button type="button" class="chat-send" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            `;
            
            const container = document.getElementById('chatMessages');
            chatMsgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromId === currentUser.id ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
            
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
                chatInput.focus();
            }
        }
        
        function showMessages() {
            if (!currentUser) return;
            
            document.getElementById('headerRight').innerHTML = '';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const dialogs = new Map();
            messages.forEach(msg => {
                const otherId = msg.fromId === currentUser.id ? msg.toId : msg.fromId;
                if (otherId !== currentUser.id && !dialogs.has(otherId)) {
                    const otherUser = users.find(u => u.id === otherId);
                    if (otherUser) {
                        const userMsgs = messages.filter(m => 
                            (m.fromId === currentUser.id && m.toId === otherId) ||
                            (m.fromId === otherId && m.toId === currentUser.id)
                        ).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                        
                        dialogs.set(otherId, {
                            user: otherUser,
                            lastMsg: userMsgs[0],
                            unread: messages.filter(m => m.fromId === otherId && m.toId === currentUser.id && !m.read).length
                        });
                    }
                }
            });
            
            const dialogsList = Array.from(dialogs.values()).sort((a,b) => 
                new Date(b.lastMsg.timestamp) - new Date(a.lastMsg.timestamp)
            );
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <h3 style="margin-bottom: 20px;">💬 Сообщения</h3>
                    <div id="dialogsList">
                        ${dialogsList.map(d => {
                            const avatarUrl = d.user.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=52&name=${encodeURIComponent(d.user.name)}`;
                            return `
                                <div class="player-item" onclick="openChat('${d.user.id}')">
                                    <img class="player-avatar" src="${avatarUrl}">
                                    <div class="player-info">
                                        <div class="player-name">${escapeHtml(d.user.name)} ${d.unread > 0 ? `<span style="background:#ff6b6b; padding:2px 8px; border-radius:12px; font-size:11px;">${d.unread}</span>` : ''}</div>
                                        <div class="player-username">@${escapeHtml(d.user.username)}</div>
                                        <div style="font-size:12px; opacity:0.6;">${d.lastMsg.text ? (d.lastMsg.text.length > 25 ? d.lastMsg.text.slice(0,25)+'...' : d.lastMsg.text) : ''}</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        ${dialogsList.length === 0 ? '<div class="empty-state">💬 Нет сообщений. Найди игрока через 🔍 и напиши ему!</div>' : ''}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[1]?.classList.add('active');
            updateBadge();
        }
        
        function showProfile() {
            if (!currentUser) return;
            
            document.getElementById('headerRight').innerHTML = '';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const avatarUrl = currentUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=90&name=${encodeURIComponent(currentUser.name)}`;
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div class="profile-header">
                        <img class="profile-avatar" src="${avatarUrl}">
                        <div class="profile-name" style="margin-top:12px;">${escapeHtml(currentUser.name)}</div>
                        <div style="background:rgba(255,107,107,0.2); padding:5px 12px; border-radius:20px; display:inline-block; margin:8px 0;">@${escapeHtml(currentUser.username)}</div>
                        <div style="margin:10px 0;">${escapeHtml(currentUser.bio)}</div>
                        <button type="button" class="auth-btn" style="width:auto; padding:10px 30px;" onclick="editProfile()">✏️ Редактировать</button>
                        <button type="button" class="auth-btn" style="width:auto; padding:10px 30px; margin-top:10px; background:rgba(255,80,80,0.5);" onclick="logout()">🚪 Выйти</button>
                    </div>
                    <div class="section-title">📊 Твой username для других:</div>
                    <div style="background:rgba(255,107,107,0.2); padding:12px; border-radius:16px; text-align:center; font-family:monospace; font-size:18px; letter-spacing:1px;">
                        ${escapeHtml(currentUser.username)}
                    </div>
                    <div style="margin-top:20px; font-size:13px; opacity:0.6; text-align:center;">
                        Дай этот username другу, чтобы он мог найти тебя!
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[2]?.classList.add('active');
        }
        
        function editProfile() {
            const newName = prompt('Новое имя:', currentUser.name);
            const newBio = prompt('О себе:', currentUser.bio);
            if (newName) currentUser.name = newName;
            if (newBio) currentUser.bio = newBio;
            
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) users[idx] = currentUser;
            saveUsers();
            localStorage.setItem('chugur_current_final', JSON.stringify(currentUser));
            showProfile();
        }
        
        function updateBadge() {
            if (!currentUser) return;
            const unread = messages.filter(m => m.toId === currentUser.id && !m.read).length;
            const msgBtn = document.querySelectorAll('.nav-item')[1];
            if (msgBtn) {
                const old = msgBtn.querySelector('.badge');
                if (old) old.remove();
                if (unread > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = unread > 99 ? '99+' : unread;
                    msgBtn.appendChild(badge);
                }
            }
        }
        
        function goHome() {
            if (currentChatUser) {
                currentChatUser = null;
                showMessages();
            } else {
                showSearch();
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function startApp() {
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('authContainer').style.display = 'none';
            showSearch();
            
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => {
                loadData();
                if (currentChatUser) {
                    const oldMsgCount = getChatMessages().length;
                    renderChat();
                }
                if (document.getElementById('dialogsList') && !currentChatUser) {
                    showMessages();
                }
                if (document.getElementById('allPlayers')) {
                    renderAllPlayers();
                }
                updateBadge();
            }, 1500);
            
            updateBadge();
        }
        
        // ========== ЗАПУСК ==========
        loadData();
        const saved = localStorage.getItem('chugur_current_final');
        if (saved) {
            const parsed = JSON.parse(saved);
            currentUser = users.find(u => u.id === parsed.id);
            if (currentUser) startApp();
            else renderAuth();
        } else {
            renderAuth();
        }
    </script>
</body>
</html>
