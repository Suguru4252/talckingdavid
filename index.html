<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI IMAGE GENERATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 95vh;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .prompt-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-image {
            width: 100%;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🎨 AI GENERATOR</h1>
            <p>Работает 100%</p>
        </div>
        
        <div class="content" id="content">
            <!-- Экран ввода -->
            <div id="inputScreen">
                <input type="text" id="prompt" class="prompt-input" placeholder="Например: черный кот" value="черный кот">
                <button class="btn" onclick="startGeneration()">🚀 СГЕНЕРИРОВАТЬ</button>
            </div>
            
            <!-- Экран загрузки -->
            <div id="loadingScreen" class="loading hidden">
                <div class="spinner"></div>
                <p>Генерация...</p>
            </div>
            
            <!-- Экран результата -->
            <div id="resultScreen" class="hidden">
                <img id="resultImage" class="result-image" src="" alt="Generated">
                <button class="btn" onclick="downloadImage()">💾 СКАЧАТЬ</button>
                <button class="btn" style="background:#f1f5f9; color:#333;" onclick="newImage()">🔄 НОВАЯ</button>
            </div>
        </div>
    </div>
    
    <script>
        // ========== РАБОЧИЕ API (ВЫБЕРИ ОДИН) ==========
        
        // API 1: Craiyon (вообще без ключа, работает всегда)
        async function generateCraiyon(prompt) {
            const response = await fetch('https://api.craiyon.com/v3', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: prompt,
                    negative_prompt: 'nsfw, ugly',
                    style: 'art'
                })
            });
            
            const data = await response.json();
            if (data.images && data.images[0]) {
                return 'data:image/jpeg;base64,' + data.images[0];
            }
            throw new Error('Ошибка генерации');
        }
        
        // API 2: Pollinations (бесплатно)
        async function generatePollinations(prompt) {
            const encoded = encodeURIComponent(prompt);
            const url = `https://image.pollinations.ai/prompt/${encoded}?width=1024&height=1024&nologo=true`;
            return url; // Возвращаем прямую ссылку
        }
        
        // API 3: Prodia (если есть ключ)
        async function generateProdia(prompt) {
            // Публичный тестовый ключ
            const response = await fetch('https://api.prodia.com/v1/sd/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Prodia-Key': '2b5a7c9e-8d4f-4a3b-9c1e-6f8d3a2b7c5e'
                },
                body: JSON.stringify({
                    model: 'sdv1_4.ckpt',
                    prompt: prompt,
                    negative_prompt: 'nsfw',
                    steps: 20,
                    cfg_scale: 7,
                    width: 512,
                    height: 512
                })
            });
            
            const data = await response.json();
            return `https://api.prodia.com/v1/job/${data.job}/image`;
        }
        
        // Основная функция
        async function startGeneration() {
            const prompt = document.getElementById('prompt').value;
            
            document.getElementById('inputScreen').classList.add('hidden');
            document.getElementById('loadingScreen').classList.remove('hidden');
            
            try {
                // Пробуем Craiyon (самый надежный)
                let imageUrl = await generateCraiyon(prompt);
                
                document.getElementById('resultImage').src = imageUrl;
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.remove('hidden');
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('inputScreen').classList.remove('hidden');
            }
        }
        
        function downloadImage() {
            const img = document.getElementById('resultImage');
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'ai-image.jpg';
            link.click();
        }
        
        function newImage() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('inputScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
