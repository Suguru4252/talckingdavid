<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chugur | Социальная сеть</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
        }

        .app {
            max-width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            padding-bottom: 70px;
        }

        .header {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
        }

        .refresh-btn, .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            color: #fff;
        }

        .content {
            padding: 20px;
        }

        .create-post {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .post-textarea {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            color: #fff;
            resize: vertical;
            margin-bottom: 12px;
        }

        .post-textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .image-preview {
            margin-bottom: 12px;
            display: none;
            position: relative;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
        }

        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .post-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .file-label {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        .publish-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
        }

        .post-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            margin-bottom: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.3s ease;
        }

        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-info {
            flex: 1;
        }

        .post-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .post-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .post-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .profile-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(78,205,196,0.2));
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff6b6b;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-bio {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .edit-profile-btn, .message-user-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: rgba(255,255,255,0.6);
            position: relative;
        }

        .nav-item.active {
            color: #ff6b6b;
        }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff6b6b;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
        }

        .search-container {
            background: rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .search-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-item-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-item-info {
            flex: 1;
        }

        .user-item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-item-username {
            font-size: 12px;
            opacity: 0.6;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.received {
            background: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 5px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-container {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .chat-send-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .chat-image-label {
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 16px;
            color: #fff;
        }

        .auth-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            margin-top: 15px;
            color: #ff6b6b;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header" id="header">
            <div class="logo" onclick="goHome()">Chugur</div>
            <button class="refresh-btn" id="headerBtn" onclick="refreshCurrentView()">🔄</button>
        </div>

        <div id="authContainer"></div>
        <div id="mainContent"></div>

        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button class="nav-item" onclick="showFeed()">🏠</button>
            <button class="nav-item" onclick="showMessages()">💬</button>
            <button class="nav-item" onclick="showSearch()">🔍</button>
            <button class="nav-item" onclick="showProfile()">👤</button>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content"><img id="modalImage" src=""></div>
    </div>

    <script>
        // ========== ГЛОБАЛЬНЫЕ КЛЮЧИ ==========
        const STORAGE_KEYS = {
            USERS: 'chugur_users_final',
            POSTS: 'chugur_posts_final',
            MESSAGES: 'chugur_messages_final'
        };

        // ========== ДАННЫЕ ==========
        let currentUser = null;
        let users = [];
        let posts = [];
        let messages = [];
        let currentChatUser = null;
        let currentView = 'feed';
        let updateInterval = null;

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        function loadData() {
            const savedUsers = localStorage.getItem(STORAGE_KEYS.USERS);
            const savedPosts = localStorage.getItem(STORAGE_KEYS.POSTS);
            const savedMessages = localStorage.getItem(STORAGE_KEYS.MESSAGES);
            
            if (savedUsers) {
                users = JSON.parse(savedUsers);
                console.log('✅ Загружено пользователей:', users.length, users.map(u => u.username));
            } else {
                // Начальный пользователь
                users = [{
                    id: '1',
                    username: 'admin',
                    password: '123',
                    name: 'Администратор',
                    avatar: '',
                    bio: 'Добро пожаловать в Chugur!'
                }];
                localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
                console.log('📝 Создан начальный пользователь: admin');
            }
            
            if (savedPosts) {
                posts = JSON.parse(savedPosts);
            } else {
                posts = [];
            }
            
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
            localStorage.setItem(STORAGE_KEYS.POSTS, JSON.stringify(posts));
            localStorage.setItem(STORAGE_KEYS.MESSAGES, JSON.stringify(messages));
            console.log('💾 Данные сохранены. Всего пользователей:', users.length);
            
            // Отправляем событие для обновления других вкладок
            window.dispatchEvent(new StorageEvent('storage', {
                key: 'chugur_data_update',
                newValue: Date.now().toString()
            }));
        }

        // Синхронизация между вкладками
        window.addEventListener('storage', function(e) {
            if (e.key === 'chugur_data_update') {
                console.log('🔄 Синхронизация данных...');
                const savedUsers = localStorage.getItem(STORAGE_KEYS.USERS);
                if (savedUsers) {
                    users = JSON.parse(savedUsers);
                    console.log('🔄 Обновлено. Пользователей:', users.length);
                }
                if (currentView === 'search') {
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput && searchInput.value) {
                        searchUsers();
                    } else {
                        showSearch();
                    }
                }
                refreshCurrentView();
            }
        });

        // ========== АУТЕНТИФИКАЦИЯ ==========
        function renderAuth() {
            document.getElementById('bottomNav').style.display = 'none';
            const container = document.getElementById('authContainer');
            container.style.display = 'block';
            document.getElementById('mainContent').innerHTML = '';
            
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="margin-bottom: 20px;">🔮 Chugur</h2>
                        <p style="margin-bottom: 20px; opacity: 0.7;">Войдите или создайте аккаунт</p>
                        <input type="text" id="loginUsername" class="auth-input" placeholder="Ваш username">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                        <button class="auth-btn" onclick="login()">Войти</button>
                        <div class="switch-auth" onclick="showRegister()">✨ Создать новый аккаунт</div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            const container = document.getElementById('authContainer');
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="margin-bottom: 20px;">📝 Создать аккаунт</h2>
                        <input type="text" id="regUsername" class="auth-input" placeholder="Придумайте username (например: john)">
                        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
                        <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                        <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
                        <div class="switch-auth" onclick="renderAuth()">← Назад</div>
                    </div>
                </div>
            `;
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = JSON.parse(JSON.stringify(user));
                localStorage.setItem('chugur_current_user_final', JSON.stringify(currentUser));
                startApp();
            } else {
                alert('❌ Неверный username или пароль');
            }
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value.trim();
            
            if (!username || !password) {
                alert('❌ Заполните все поля');
                return;
            }
            
            if (username.length < 2) {
                alert('❌ Username должен быть не менее 2 символов');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('❌ Пользователь с таким username уже существует!');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                name: name || username,
                avatar: '',
                bio: 'Новый пользователь Chugur'
            };
            
            users.push(newUser);
            saveData();
            currentUser = newUser;
            localStorage.setItem('chugur_current_user_final', JSON.stringify(currentUser));
            startApp();
            alert(`✅ Аккаунт создан! Ваш username: ${username}\nТеперь другие пользователи смогут найти вас по этому username.`);
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('chugur_current_user_final');
            if (updateInterval) clearInterval(updateInterval);
            renderAuth();
        }

        // ========== ПОСТЫ ==========
        let selectedImageData = null;

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImageData = event.target.result;
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `<img src="${selectedImageData}"><button class="remove-image" onclick="removeImage()">✕</button>`;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            selectedImageData = null;
            const preview = document.getElementById('imagePreview');
            if (preview) { preview.style.display = 'none'; preview.innerHTML = ''; }
        }

        function publishPost() {
            const text = document.getElementById('postText').value.trim();
            if (!text && !selectedImageData) { alert('Напишите текст или добавьте фото'); return; }
            
            posts.unshift({
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.name,
                userUsername: currentUser.username,
                userAvatar: currentUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=48&name=${encodeURIComponent(currentUser.name)}`,
                text: text,
                image: selectedImageData || '',
                createdAt: new Date().toISOString(),
                likes: []
            });
            
            saveData();
            document.getElementById('postText').value = '';
            removeImage();
            if (currentView === 'feed') renderFeed();
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                const idx = post.likes.indexOf(currentUser.id);
                if (idx === -1) post.likes.push(currentUser.id);
                else post.likes.splice(idx, 1);
                saveData();
                if (currentView === 'feed') renderFeed();
                else if (currentView === 'profile') showProfile();
            }
        }

        function deletePost(postId) {
            if (confirm('Удалить пост?')) {
                posts = posts.filter(p => p.id !== postId);
                saveData();
                if (currentView === 'feed') renderFeed();
                else if (currentView === 'profile') showProfile();
            }
        }

        // ========== СООБЩЕНИЯ ==========
        let chatImageData = null;

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text && !chatImageData) return;
            
            const message = {
                id: Date.now().toString(),
                fromId: currentUser.id,
                toId: currentChatUser.id,
                fromName: currentUser.name,
                fromUsername: currentUser.username,
                toName: currentChatUser.name,
                toUsername: currentChatUser.username,
                text: text,
                image: chatImageData || '',
                timestamp: new Date().toISOString(),
                read: false
            };
            
            messages.push(message);
            saveData();
            
            input.value = '';
            chatImageData = null;
            const preview = document.getElementById('chatImagePreview');
            if (preview) {
                preview.style.display = 'none';
                preview.innerHTML = '';
            }
            renderChat();
            updateMessageBadge();
        }

        function updateMessageBadge() {
            const unreadCount = messages.filter(m => m.toId === currentUser?.id && !m.read).length;
            const msgBtn = document.querySelector('.nav-item:nth-child(2)');
            if (msgBtn) {
                const oldBadge = msgBtn.querySelector('.badge');
                if (oldBadge) oldBadge.remove();
                if (unreadCount > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    msgBtn.appendChild(badge);
                }
            }
        }

        function handleChatImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    chatImageData = event.target.result;
                    const preview = document.getElementById('chatImagePreview');
                    preview.innerHTML = `<div style="position:relative; display:inline-block;"><img src="${chatImageData}" style="max-width: 60px; max-height: 60px; border-radius: 8px;"><button onclick="removeChatImage()" style="position:absolute; top:-5px; right:-5px; background:red; border:none; border-radius:50%; width:20px; height:20px; color:white; cursor:pointer;">✕</button></div>`;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeChatImage() {
            chatImageData = null;
            const preview = document.getElementById('chatImagePreview');
            if (preview) {
                preview.style.display = 'none';
                preview.innerHTML = '';
            }
        }

        function getChatMessages() {
            return messages.filter(m => 
                (m.fromId === currentUser.id && m.toId === currentChatUser.id) ||
                (m.fromId === currentChatUser.id && m.toId === currentUser.id)
            ).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        }

        function markMessagesAsRead() {
            let updated = false;
            messages.forEach(m => {
                if (m.toId === currentUser.id && m.fromId === currentChatUser.id && !m.read) {
                    m.read = true;
                    updated = true;
                }
            });
            if (updated) {
                saveData();
                updateMessageBadge();
            }
        }

        function renderChat() {
            document.getElementById('headerBtn').style.display = 'none';
            const header = document.getElementById('header');
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.innerHTML = '←';
            backBtn.onclick = () => { currentChatUser = null; showMessages(); };
            header.insertBefore(backBtn, header.firstChild);
            
            const chatMsgs = getChatMessages();
            markMessagesAsRead();
            
            document.getElementById('mainContent').innerHTML = `
                <div class="chat-container">
                    <div style="padding:15px; text-align:center; border-bottom:1px solid rgba(255,255,255,0.1);">
                        <strong>${escapeHtml(currentChatUser.name)}</strong><br>
                        <span style="opacity:0.6; font-size:12px;">@${escapeHtml(currentChatUser.username)}</span>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div id="chatImagePreview" style="padding:0 15px; display:none;"></div>
                    <div class="chat-input-container">
                        <label class="chat-image-label" for="chatImage">📷</label>
                        <input type="file" id="chatImage" accept="image/*" onchange="handleChatImage(event)">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение...">
                        <button class="chat-send-btn" onclick="sendMessage()">➤</button>
                    </div>
                </div>
            `;
            
            const messagesContainer = document.getElementById('chatMessages');
            chatMsgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.fromId === currentUser.id ? 'sent' : 'received'}`;
                div.innerHTML = `
                    ${msg.text ? `<div class="message-text">${escapeHtml(msg.text)}</div>` : ''}
                    ${msg.image ? `<img class="message-image" src="${msg.image}" onclick="openModal('${msg.image}')">` : ''}
                    <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString().slice(0,5)}</div>
                `;
                messagesContainer.appendChild(div);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        }

        function showMessages() {
            currentView = 'messages';
            currentChatUser = null;
            document.getElementById('headerBtn').style.display = 'flex';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const dialogsMap = new Map();
            
            messages.forEach(msg => {
                const otherId = msg.fromId === currentUser.id ? msg.toId : msg.fromId;
                if (otherId !== currentUser.id && !dialogsMap.has(otherId)) {
                    const otherUser = users.find(u => u.id === otherId);
                    if (otherUser) {
                        const userMessages = messages.filter(m => 
                            (m.fromId === currentUser.id && m.toId === otherId) ||
                            (m.fromId === otherId && m.toId === currentUser.id)
                        ).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                        
                        dialogsMap.set(otherId, {
                            user: otherUser,
                            lastMsg: userMessages[0],
                            unread: messages.filter(m => m.fromId === otherId && m.toId === currentUser.id && !m.read).length
                        });
                    }
                }
            });
            
            const dialogs = Array.from(dialogsMap.values()).sort((a,b) => 
                new Date(b.lastMsg.timestamp) - new Date(a.lastMsg.timestamp)
            );
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <h3 style="margin-bottom: 15px;">💬 Диалоги</h3>
                    <div class="user-list" id="chatList">
                        ${dialogs.map(d => `
                            <div class="user-item" onclick="openChat('${d.user.id}')">
                                <img class="user-item-avatar" src="${d.user.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=50&name=${encodeURIComponent(d.user.name)}`}">
                                <div class="user-item-info">
                                    <div class="user-item-name">${escapeHtml(d.user.name)} ${d.unread > 0 ? `<span style="background:#ff6b6b; padding:2px 6px; border-radius:10px; font-size:10px; margin-left:5px;">${d.unread}</span>` : ''}</div>
                                    <div class="user-item-username">@${escapeHtml(d.user.username)}</div>
                                    <div style="font-size:12px; opacity:0.6;">${d.lastMsg.text ? (d.lastMsg.text.length > 30 ? d.lastMsg.text.slice(0,30)+'...' : d.lastMsg.text) : '📷 Фото'}</div>
                                </div>
                            </div>
                        `).join('')}
                        ${dialogs.length === 0 ? '<div class="empty-state">💬 Нет сообщений. Найдите пользователя в поиске 🔍</div>' : ''}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[1]?.classList.add('active');
            updateMessageBadge();
        }

        function openChat(userId) {
            currentChatUser = users.find(u => u.id === userId);
            if (currentChatUser) renderChat();
        }

        // ========== ПОИСК (ИСПРАВЛЕН) ==========
        function showSearch() {
            currentView = 'search';
            document.getElementById('headerBtn').style.display = 'flex';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            // Показываем всех пользователей сразу
            const allUsers = users.filter(u => u.id !== currentUser?.id);
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <h3 style="margin-bottom: 15px;">🔍 Поиск пользователей</h3>
                    <div class="search-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Введите username или имя...">
                        <button class="search-btn" onclick="searchUsers()">Найти</button>
                    </div>
                    <div style="margin: 10px 0 5px; font-size:12px; opacity:0.6;">Всего пользователей: ${users.length - 1}</div>
                    <div id="searchResults" class="user-list">
                        ${allUsers.map(u => `
                            <div class="user-item" onclick="startChat('${u.id}')">
                                <img class="user-item-avatar" src="${u.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=50&name=${encodeURIComponent(u.name)}`}">
                                <div class="user-item-info">
                                    <div class="user-item-name">${escapeHtml(u.name)}</div>
                                    <div class="user-item-username">@${escapeHtml(u.username)}</div>
                                    <button class="edit-profile-btn" style="margin-top:8px; padding:6px 16px; font-size:12px;" onclick="event.stopPropagation(); startChat('${u.id}')">💬 Написать</button>
                                </div>
                            </div>
                        `).join('')}
                        ${allUsers.length === 0 ? '<div class="empty-state">😢 Нет других пользователей. Пригласите друзей!</div>' : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchUsers(); });
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[2]?.classList.add('active');
        }

        function searchUsers() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const container = document.getElementById('searchResults');
            
            let results = users.filter(u => u.id !== currentUser?.id);
            
            if (query) {
                results = results.filter(u => 
                    u.name.toLowerCase().includes(query) || 
                    u.username.toLowerCase().includes(query)
                );
            }
            
            if (results.length === 0) {
                container.innerHTML = '<div class="empty-state">😢 Пользователи не найдены</div>';
            } else {
                container.innerHTML = results.map(u => `
                    <div class="user-item" onclick="startChat('${u.id}')">
                        <img class="user-item-avatar" src="${u.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=50&name=${encodeURIComponent(u.name)}`}">
                        <div class="user-item-info">
                            <div class="user-item-name">${escapeHtml(u.name)}</div>
                            <div class="user-item-username">@${escapeHtml(u.username)}</div>
                            <button class="edit-profile-btn" style="margin-top:8px; padding:6px 16px; font-size:12px;" onclick="event.stopPropagation(); startChat('${u.id}')">💬 Написать</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function startChat(userId) {
            currentChatUser = users.find(u => u.id === userId);
            if (currentChatUser) renderChat();
        }

        // ========== ПРОФИЛЬ ==========
        function showProfile() {
            currentView = 'profile';
            document.getElementById('headerBtn').style.display = 'flex';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const userPosts = posts.filter(p => p.userId === currentUser.id).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div class="profile">
                        <div class="profile-header">
                            <img class="profile-avatar" src="${currentUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=100&name=${encodeURIComponent(currentUser.name)}`}">
                            <div class="profile-name">${escapeHtml(currentUser.name)}</div>
                            <div class="profile-bio" style="font-size:12px;">@${escapeHtml(currentUser.username)}</div>
                            <div class="profile-bio">${escapeHtml(currentUser.bio)}</div>
                            <button class="edit-profile-btn" onclick="editProfile()">✏️ Редактировать</button>
                            <button class="message-user-btn" onclick="logout()">🚪 Выйти</button>
                        </div>
                        <div class="profile-stats">
                            <div class="stat"><div class="stat-number">${userPosts.length}</div><div class="stat-label">Постов</div></div>
                            <div class="stat"><div class="stat-number">${messages.filter(m => m.fromId === currentUser.id).length}</div><div class="stat-label">Сообщений</div></div>
                        </div>
                        <div id="profilePosts"></div>
                    </div>
                </div>
            `;
            
            const postsContainer = document.getElementById('profilePosts');
            if (userPosts.length === 0) {
                postsContainer.innerHTML = '<div class="empty-state">📝 У вас пока нет постов</div>';
            } else {
                userPosts.forEach(post => postsContainer.appendChild(createPostElement(post)));
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[3]?.classList.add('active');
        }

        function editProfile() {
            const newName = prompt('Новое имя:', currentUser.name);
            const newBio = prompt('О себе:', currentUser.bio);
            const newAvatar = prompt('Ссылка на фото (оставьте пустым):', currentUser.avatar);
            
            if (newName) currentUser.name = newName;
            if (newBio) currentUser.bio = newBio;
            if (newAvatar) currentUser.avatar = newAvatar;
            
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) users[idx] = currentUser;
            saveData();
            localStorage.setItem('chugur_current_user_final', JSON.stringify(currentUser));
            showProfile();
        }

        // ========== ЛЕНТА ==========
        function renderFeed() {
            currentView = 'feed';
            document.getElementById('headerBtn').style.display = 'flex';
            const oldBack = document.querySelector('.back-btn');
            if (oldBack) oldBack.remove();
            
            const sortedPosts = [...posts].sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            document.getElementById('mainContent').innerHTML = `
                <div class="content">
                    <div class="create-post">
                        <textarea id="postText" class="post-textarea" rows="3" placeholder="Что нового?"></textarea>
                        <div id="imagePreview" class="image-preview"></div>
                        <div class="post-actions">
                            <label class="file-label" for="postImage">📷 Фото</label>
                            <input type="file" id="postImage" accept="image/*" onchange="handleImageUpload(event)">
                            <button class="publish-btn" onclick="publishPost()">Опубликовать</button>
                        </div>
                    </div>
                    <div id="feedContainer"></div>
                </div>
            `;
            
            const feedContainer = document.getElementById('feedContainer');
            if (sortedPosts.length === 0) {
                feedContainer.innerHTML = '<div class="empty-state">😢 Нет постов. Будьте первым!</div>';
            } else {
                sortedPosts.forEach(post => feedContainer.appendChild(createPostElement(post)));
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0]?.classList.add('active');
        }

        function createPostElement(post) {
            const div = document.createElement('div');
            div.className = 'post-card';
            const isLiked = post.likes.includes(currentUser.id);
            
            div.innerHTML = `
                <div class="post-header">
                    <img class="post-avatar" src="${post.userAvatar}">
                    <div class="post-info">
                        <div class="post-name">${escapeHtml(post.userName)}</div>
                        <div class="post-time" style="font-size:10px;">@${escapeHtml(post.userUsername)} • ${formatDate(new Date(post.createdAt))}</div>
                    </div>
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${post.image ? `<img class="post-image" src="${post.image}" onclick="openModal('${post.image}')">` : ''}
                <div class="post-stats">
                    <button class="stat-btn" onclick="toggleLike('${post.id}')">${isLiked ? '❤️' : '🤍'} ${post.likes.length || ''}</button>
                    ${post.userId === currentUser.id ? `<button class="stat-btn" onclick="deletePost('${post.id}')">🗑️</button>` : ''}
                    <button class="stat-btn" onclick="startChat('${post.userId}')">💬</button>
                </div>
            `;
            return div;
        }

        function goHome() {
            if (currentChatUser) {
                currentChatUser = null;
                showMessages();
            } else {
                showFeed();
            }
        }

        function refreshCurrentView() {
            if (currentView === 'feed') renderFeed();
            else if (currentView === 'messages' && !currentChatUser) showMessages();
            else if (currentView === 'search') { 
                const searchInput = document.getElementById('searchInput');
                if (searchInput && searchInput.value) {
                    searchUsers();
                } else {
                    showSearch();
                }
            }
            else if (currentView === 'profile') showProfile();
            else if (currentChatUser) renderChat();
            updateMessageBadge();
        }

        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff/60000);
            if (mins < 1) return 'только что';
            if (mins < 60) return `${mins} мин`;
            if (diff < 86400000) return `${Math.floor(mins/60)} ч`;
            return `${Math.floor(diff/86400000)} д`;
        }

        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        function openModal(src) { document.getElementById('modalImage').src = src; document.getElementById('imageModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        function showFeed() { renderFeed(); }
        
        function startApp() {
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('authContainer').style.display = 'none';
            renderFeed();
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(() => { 
                if (currentView === 'feed') renderFeed();
                updateMessageBadge();
            }, 20000);
            updateMessageBadge();
        }

        // ========== ЗАПУСК ==========
        loadData();
        const savedUser = localStorage.getItem('chugur_current_user_final');
        if (savedUser) {
            const parsed = JSON.parse(savedUser);
            currentUser = users.find(u => u.id === parsed.id);
            if (currentUser) startApp();
            else renderAuth();
        } else {
            renderAuth();
        }
    </script>
</body>
</html>
