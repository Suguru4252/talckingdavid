<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chugur | Социальная сеть</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            overflow-x: hidden;
        }

        .app {
            max-width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            padding-bottom: 70px;
        }

        /* Header */
        .header {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            color: #fff;
            transition: all 0.3s;
        }

        .refresh-btn:active {
            transform: rotate(180deg);
        }

        /* Контент */
        .content {
            padding: 20px;
            padding-bottom: 80px;
        }

        /* Форма создания поста */
        .create-post {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .post-textarea {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 12px;
            font-size: 16px;
            font-family: inherit;
            color: #fff;
            resize: vertical;
            margin-bottom: 12px;
        }

        .post-textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .post-textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .image-preview {
            margin-bottom: 12px;
            display: none;
            position: relative;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
        }

        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .post-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .file-label {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .file-label:active {
            background: rgba(255,255,255,0.25);
        }

        .publish-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
            transition: transform 0.2s;
        }

        .publish-btn:active {
            transform: scale(0.95);
        }

        /* Посты */
        .post-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.3s ease;
        }

        .post-header {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .post-info {
            flex: 1;
        }

        .post-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .post-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .post-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .post-stats {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            transition: all 0.2s;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .stat-btn:active {
            background: rgba(255,255,255,0.1);
            transform: scale(0.95);
        }

        /* Профиль */
        .profile {
            padding: 0;
        }

        .profile-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255,107,107,0.2), rgba(78,205,196,0.2));
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff6b6b;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-bio {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .edit-profile-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Нижнее меню */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            position: relative;
        }

        .nav-item.active {
            color: #ff6b6b;
            transform: scale(1.1);
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #ff6b6b;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            min-width: 18px;
        }

        /* Аутентификация */
        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            font-size: 16px;
            color: #fff;
        }

        .auth-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .auth-btn {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            margin-top: 15px;
            color: #ff6b6b;
            cursor: pointer;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 20px;
        }

        /* Уведомления */
        .notifications-panel {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        /* Анимации */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        input[type="file"] {
            display: none;
        }

        .hidden {
            display: none;
        }

        /* Скролл */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">
            <div class="logo">Chugur</div>
            <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
        </div>

        <div id="authContainer"></div>
        <div id="mainContent"></div>

        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button class="nav-item" onclick="showFeed()">🏠</button>
            <button class="nav-item" onclick="showNotifications()">🔔</button>
            <button class="nav-item" onclick="showProfile()">👤</button>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <div class="modal-content">
            <img id="modalImage" src="">
        </div>
    </div>

    <script>
        // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
        let currentUser = null;
        let users = [];
        let posts = [];
        let notifications = [];
        let currentView = 'feed';
        let autoUpdateInterval = null;
        let lastUpdateTime = Date.now();

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initData() {
            const savedUsers = localStorage.getItem('chugur_users');
            const savedPosts = localStorage.getItem('chugur_posts');
            const savedNotifications = localStorage.getItem('chugur_notifications');
            
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [];
            }
            
            if (savedPosts) {
                posts = JSON.parse(savedPosts);
            } else {
                posts = [];
            }
            
            if (savedNotifications) {
                notifications = JSON.parse(savedNotifications);
            } else {
                notifications = [];
            }
            
            updateStats();
        }

        function saveData() {
            localStorage.setItem('chugur_users', JSON.stringify(users));
            localStorage.setItem('chugur_posts', JSON.stringify(posts));
            localStorage.setItem('chugur_notifications', JSON.stringify(notifications));
            updateStats();
        }

        function updateStats() {
            users.forEach(user => {
                user.postsCount = posts.filter(p => p.userId === user.id).length;
            });
        }

        function addNotification(userId, type, fromUserId, postId = null) {
            const fromUser = users.find(u => u.id === fromUserId);
            if (!fromUser || userId === fromUserId) return;
            
            const notification = {
                id: Date.now().toString(),
                userId: userId,
                type: type,
                fromUserName: fromUser.name,
                fromUserAvatar: fromUser.avatar || '',
                postId: postId,
                createdAt: new Date().toISOString(),
                read: false
            };
            
            notifications.unshift(notification);
            saveData();
            updateNotificationBadge();
        }

        function updateNotificationBadge() {
            const unreadCount = notifications.filter(n => n.userId === currentUser?.id && !n.read).length;
            const notifBtn = document.querySelector('.nav-item:nth-child(2)');
            if (notifBtn) {
                const existingBadge = notifBtn.querySelector('.badge');
                if (unreadCount > 0) {
                    if (existingBadge) {
                        existingBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    } else {
                        const badge = document.createElement('span');
                        badge.className = 'badge';
                        badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                        notifBtn.appendChild(badge);
                    }
                } else if (existingBadge) {
                    existingBadge.remove();
                }
            }
        }

        // ========== АУТЕНТИФИКАЦИЯ (ФИКС) ==========
        function renderAuth() {
            document.getElementById('bottomNav').style.display = 'none';
            const container = document.getElementById('authContainer');
            const mainContent = document.getElementById('mainContent');
            
            container.style.display = 'block';
            mainContent.innerHTML = '';
            
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="margin-bottom: 20px;">Chugur</h2>
                        <p style="margin-bottom: 20px; opacity: 0.8;">Войдите в свою социальную сеть</p>
                        <input type="text" id="loginUsername" class="auth-input" placeholder="Имя пользователя">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                        <button class="auth-btn" onclick="login()">Войти</button>
                        <div class="switch-auth" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
                    </div>
                </div>
            `;
        }

        function showRegister() {
            const container = document.getElementById('authContainer');
            container.innerHTML = `
                <div class="auth-section">
                    <div class="auth-card">
                        <h2 style="margin-bottom: 20px;">Регистрация</h2>
                        <input type="text" id="regUsername" class="auth-input" placeholder="Имя пользователя">
                        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
                        <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                        <button class="auth-btn" onclick="register()">Зарегистрироваться</button>
                        <div class="switch-auth" onclick="renderAuth()">Уже есть аккаунт? Войти</div>
                    </div>
                </div>
            `;
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = JSON.parse(JSON.stringify(user));
                localStorage.setItem('chugur_current_user', JSON.stringify(currentUser));
                renderApp();
                showToast('Добро пожаловать в Chugur!');
            } else {
                alert('Неверное имя пользователя или пароль');
            }
        }

        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('regName').value.trim();
            
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('Пользователь уже существует');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                username: username,
                password: password,
                name: name || username,
                avatar: '',
                bio: 'Новый пользователь Chugur',
                postsCount: 0,
                followers: [],
                following: []
            };
            
            users.push(newUser);
            saveData();
            
            currentUser = newUser;
            localStorage.setItem('chugur_current_user', JSON.stringify(currentUser));
            renderApp();
            showToast('Регистрация успешна!');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('chugur_current_user');
            if (autoUpdateInterval) clearInterval(autoUpdateInterval);
            renderAuth();
            showToast('Вы вышли из аккаунта');
        }

        // ========== СОЗДАНИЕ ПОСТА ==========
        let selectedImageData = null;

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectedImageData = event.target.result;
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `
                        <img src="${selectedImageData}" alt="preview">
                        <button class="remove-image" onclick="removeImage()">✕</button>
                    `;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            selectedImageData = null;
            const preview = document.getElementById('imagePreview');
            if (preview) {
                preview.style.display = 'none';
                preview.innerHTML = '';
            }
            const input = document.getElementById('postImage');
            if (input) input.value = '';
        }

        async function publishPost() {
            const text = document.getElementById('postText').value.trim();
            
            if (!text && !selectedImageData) {
                showToast('Напишите текст или добавьте фото', true);
                return;
            }
            
            const newPost = {
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.name,
                userAvatar: currentUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=48&name=${encodeURIComponent(currentUser.name)}`,
                text: text,
                image: selectedImageData || '',
                createdAt: new Date().toISOString(),
                likes: []
            };
            
            posts.unshift(newPost);
            saveData();
            
            document.getElementById('postText').value = '';
            removeImage();
            
            if (currentView === 'feed') {
                renderFeed();
            } else if (currentView === 'profile') {
                renderProfile();
            }
            
            showToast('Пост опубликован!');
        }

        // ========== ЛЕНТА ==========
        function renderFeed() {
            currentView = 'feed';
            const container = document.getElementById('mainContent');
            
            const feedPosts = [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            container.innerHTML = `
                <div class="content">
                    <div class="create-post">
                        <textarea id="postText" class="post-textarea" rows="3" placeholder="Что нового?"></textarea>
                        <div id="imagePreview" class="image-preview"></div>
                        <div class="post-actions">
                            <label class="file-label" for="postImage">📷 Фото</label>
                            <input type="file" id="postImage" accept="image/*" onchange="handleImageUpload(event)">
                            <button class="publish-btn" onclick="publishPost()">Опубликовать</button>
                        </div>
                    </div>
                    <div id="feedContainer"></div>
                </div>
            `;
            
            const feedContainer = document.getElementById('feedContainer');
            if (feedPosts.length === 0) {
                feedContainer.innerHTML = '<div style="text-align: center; padding: 60px; opacity: 0.7;">😢 Пока нет постов. Будь первым!</div>';
            } else {
                feedPosts.forEach(post => {
                    feedContainer.appendChild(createPostElement(post));
                });
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0]?.classList.add('active');
        }

        function createPostElement(post) {
            const div = document.createElement('div');
            div.className = 'post-card';
            
            const postDate = new Date(post.createdAt);
            const timeAgo = getTimeAgo(postDate);
            const isLiked = post.likes.includes(currentUser.id);
            
            div.innerHTML = `
                <div class="post-header">
                    <img class="post-avatar" src="${post.userAvatar}" alt="avatar" onclick="viewUserProfile('${post.userId}')">
                    <div class="post-info">
                        <div class="post-name" onclick="viewUserProfile('${post.userId}')">${escapeHtml(post.userName)}</div>
                        <div class="post-time">${timeAgo}</div>
                    </div>
                </div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${post.image ? `<img class="post-image" src="${post.image}" alt="post" onclick="openModal('${post.image}')">` : ''}
                <div class="post-stats">
                    <button class="stat-btn" onclick="toggleLike('${post.id}')">
                        ${isLiked ? '❤️' : '🤍'} ${post.likes.length > 0 ? post.likes.length : ''}
                    </button>
                    <button class="stat-btn" onclick="deletePost('${post.id}')" ${post.userId !== currentUser.id ? 'style="display:none"' : ''}>
                        🗑️ Удалить
                    </button>
                </div>
            `;
            
            return div;
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                const index = post.likes.indexOf(currentUser.id);
                if (index === -1) {
                    post.likes.push(currentUser.id);
                    addNotification(post.userId, 'like', currentUser.id, postId);
                } else {
                    post.likes.splice(index, 1);
                }
                saveData();
                refreshCurrentView();
                showToast(index === -1 ? '❤️ Лайк поставлен' : '💔 Лайк убран');
            }
        }

        function deletePost(postId) {
            if (confirm('Удалить пост?')) {
                posts = posts.filter(p => p.id !== postId);
                saveData();
                refreshCurrentView();
                showToast('Пост удален');
            }
        }

        // ========== ПРОФИЛЬ (С УДОБНЫМ РЕДАКТИРОВАНИЕМ) ==========
        function renderProfile() {
            currentView = 'profile';
            const container = document.getElementById('mainContent');
            const userPosts = posts.filter(p => p.userId === currentUser.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            container.innerHTML = `
                <div class="content">
                    <div class="profile">
                        <div class="profile-header">
                            <img class="profile-avatar" id="profileAvatar" src="${currentUser.avatar || `https://ui-avatars.com/api/?background=ff6b6b&color=fff&bold=true&size=100&name=${encodeURIComponent(currentUser.name)}`}" alt="avatar">
                            <div class="profile-name" id="profileName">${escapeHtml(currentUser.name)}</div>
                            <div class="profile-bio" id="profileBio">${escapeHtml(currentUser.bio)}</div>
                            <button class="edit-profile-btn" onclick="editProfileModal()">✏️ Редактировать профиль</button>
                        </div>
                        <div class="profile-stats">
                            <div class="stat">
                                <div class="stat-number">${userPosts.length}</div>
                                <div class="stat-label">Постов</div>
                            </div>
                            <div class="stat">
                                <div class="stat-number">${currentUser.followers?.length || 0}</div>
                                <div class="stat-label">Подписчиков</div>
                            </div>
                            <div class="stat">
                                <div class="stat-number">${currentUser.following?.length || 0}</div>
                                <div class="stat-label">Подписок</div>
                            </div>
                        </div>
                        <div id="profilePosts"></div>
                    </div>
                </div>
            `;
            
            const postsContainer = document.getElementById('profilePosts');
            if (userPosts.length === 0) {
                postsContainer.innerHTML = '<div style="text-align: center; padding: 40px; opacity: 0.7;">📝 У вас пока нет постов</div>';
            } else {
                userPosts.forEach(post => {
                    postsContainer.appendChild(createPostElement(post));
                });
            }
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[2]?.classList.add('active');
        }

        function editProfileModal() {
            const newName = prompt('Введите новое имя:', currentUser.name);
            const newBio = prompt('Расскажите о себе:', currentUser.bio);
            const newAvatar = prompt('Ссылка на фото профиля (или оставьте пустым):', currentUser.avatar);
            
            if (newName) currentUser.name = newName;
            if (newBio) currentUser.bio = newBio;
            if (newAvatar) currentUser.avatar = newAvatar;
            
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                saveData();
                localStorage.setItem('chugur_current_user', JSON.stringify(currentUser));
            }
            
            renderProfile();
            showToast('Профиль обновлен!');
        }

        // ========== УВЕДОМЛЕНИЯ ==========
        function showNotifications() {
            currentView = 'notifications';
            const container = document.getElementById('mainContent');
            const userNotifications = notifications.filter(n => n.userId === currentUser.id);
            
            userNotifications.forEach(n => n.read = true);
            saveData();
            updateNotificationBadge();
            
            container.innerHTML = `
                <div class="content">
                    <div class="notifications-panel">
                        <h3 style="margin-bottom: 15px;">Уведомления</h3>
                        ${userNotifications.length === 0 ? '<div style="text-align: center; padding: 40px; opacity: 0.7;">🔔 Нет уведомлений</div>' : 
                            userNotifications.map(n => `
                                <div class="notification-item">
                                    ${n.type === 'like' ? '❤️' : '➕'} 
                                    <strong>${escapeHtml(n.fromUserName)}</strong> 
                                    ${n.type === 'like' ? 'лайкнул ваш пост' : 'подписался на вас'}
                                    <div style="font-size: 11px; opacity: 0.5; margin-top: 5px;">${getTimeAgo(new Date(n.createdAt))}</div>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item')[1]?.classList.add('active');
        }

        // ========== ОБНОВЛЕНИЯ ==========
        function autoUpdate() {
            const now = Date.now();
            if (now - lastUpdateTime >= 20000) {
                refreshCurrentView();
                lastUpdateTime = now;
                showToast('Лента обновлена', false);
            }
        }

        function manualRefresh() {
            refreshCurrentView();
            showToast('Обновлено! 🔄');
            lastUpdateTime = Date.now();
        }

        function refreshCurrentView() {
            if (currentView === 'feed') {
                renderFeed();
            } else if (currentView === 'profile') {
                renderProfile();
            } else if (currentView === 'notifications') {
                showNotifications();
            }
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function getTimeAgo(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 24) return `${hours} ч назад`;
            if (days < 7) return `${days} д назад`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#ff6b6b' : '#4ecdc4'};
                color: white;
                padding: 10px 20px;
                border-radius: 30px;
                z-index: 1000;
                font-size: 14px;
                animation: slideUp 0.3s ease;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function openModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageSrc;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function showFeed() {
            renderFeed();
        }

        function viewUserProfile(userId) {
            if (userId === currentUser.id) {
                renderProfile();
            } else {
                showToast(`👤 Профиль пользователя`);
            }
        }

        function renderApp() {
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('authContainer').style.display = 'none';
            renderFeed();
            if (autoUpdateInterval) clearInterval(autoUpdateInterval);
            autoUpdateInterval = setInterval(autoUpdate, 20000);
            updateNotificationBadge();
        }

        // ========== ЗАПУСК ==========
        initData();
        
        const savedUser = localStorage.getItem('chugur_current_user');
        if (savedUser) {
            const parsedUser = JSON.parse(savedUser);
            currentUser = users.find(u => u.id === parsedUser.id);
            if (currentUser) {
                renderApp();
            } else {
                renderAuth();
            }
        } else {
            renderAuth();
        }
    </script>
</body>
</html>
